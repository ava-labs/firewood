syntax = "proto3";
package firewood.remote;
option go_package = "github.com/ava-labs/firewood/ffi/remote/proto";

service FirewoodRemote {
  // Bootstrap: get a truncated trie for a given root hash.
  rpc GetTruncatedTrie(GetTruncatedTrieRequest) returns (GetTruncatedTrieResponse);

  // Read: get a value with its Merkle proof.
  rpc GetValue(GetValueRequest) returns (GetValueResponse);

  // Write: two-phase commit.
  rpc CreateProposal(CreateProposalRequest) returns (CreateProposalResponse);
  rpc CommitProposal(CommitProposalRequest) returns (CommitProposalResponse);

  // Drop a pending proposal without committing.
  rpc DropProposal(DropProposalRequest) returns (DropProposalResponse);

  // Paginated iteration over a proposal's key-value pairs.
  rpc IterBatch(IterBatchRequest) returns (IterBatchResponse);

  // Multi-head: register a new validator and get its assigned ID.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Multi-head: deregister a validator.
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  // Multi-head: advance a validator's head to an existing revision.
  rpc AdvanceToHash(AdvanceToHashRequest) returns (AdvanceToHashResponse);
}

message GetTruncatedTrieRequest {
  // 32-byte root hash identifying the revision.
  bytes root_hash = 1;
  // Truncation depth in nibble levels.
  uint32 depth = 2;
}

message GetTruncatedTrieResponse {
  // Serialized TruncatedTrie (produced by TruncatedTrie.MarshalBinary).
  bytes trie_data = 1;
}

message GetValueRequest {
  // 32-byte root hash identifying the revision to read from.
  bytes root_hash = 1;
  // The key to look up.
  bytes key = 2;
}

message GetValueResponse {
  // The value associated with the key. Empty if the key was not found.
  optional bytes value = 1;
  // Serialized single-key Merkle proof.
  bytes proof = 2;
}

message BatchOperation {
  enum OpType {
    PUT = 0;
    DELETE = 1;
    PREFIX_DELETE = 2;
  }
  OpType op_type = 1;
  bytes key = 2;
  // Value payload; empty for DELETE operations.
  bytes value = 3;
}

message CreateProposalRequest {
  // 32-byte root hash of the base revision.
  bytes root_hash = 1;
  // The batch operations to propose.
  repeated BatchOperation ops = 2;
  // Client's truncation depth for witness generation.
  uint32 depth = 3;
  // Optional parent proposal ID for chained proposals.
  optional uint64 parent_proposal_id = 4;
  // Validator ID for multi-head server. Ignored by single-head servers.
  optional uint64 validator_id = 5;
}

message CreateProposalResponse {
  // Server-assigned proposal identifier.
  uint64 proposal_id = 1;
  // 32-byte root hash after applying the batch operations.
  bytes new_root_hash = 2;
  // Serialized WitnessProof (produced by WitnessProof.MarshalBinary).
  bytes witness_proof = 3;
}

message CommitProposalRequest {
  // The proposal identifier returned by CreateProposal.
  uint64 proposal_id = 1;
}

message CommitProposalResponse {
}

message DropProposalRequest {
  // The proposal identifier to drop.
  uint64 proposal_id = 1;
}

message DropProposalResponse {
}

message IterBatchRequest {
  // The proposal to iterate over.
  uint64 proposal_id = 1;
  // Start iteration at the first key >= start_key.
  bytes start_key = 2;
  // Maximum number of key-value pairs to return.
  uint32 batch_size = 3;
  // 32-byte root hash for range proof generation. If provided, the response
  // will include a serialized range proof covering this batch.
  bytes root_hash = 4;
}

message KeyValuePair {
  bytes key = 1;
  bytes value = 2;
}

message RegisterRequest {}

message RegisterResponse {
  // Server-assigned unique validator identifier.
  uint64 validator_id = 1;
  // 32-byte root hash of the assigned head.
  bytes root_hash = 2;
}

message DeregisterRequest {
  // The validator identifier to deregister.
  uint64 validator_id = 1;
}

message DeregisterResponse {}

message AdvanceToHashRequest {
  // The validator identifier.
  uint64 validator_id = 1;
  // 32-byte root hash to advance to.
  bytes root_hash = 2;
}

message AdvanceToHashResponse {}

message IterBatchResponse {
  // The key-value pairs in this batch.
  repeated KeyValuePair pairs = 1;
  // True if there are more pairs beyond this batch.
  bool has_more = 2;
  // Serialized range proof covering this batch. Present only when root_hash
  // was provided in the request.
  bytes range_proof = 3;
}
