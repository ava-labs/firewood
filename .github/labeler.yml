      - any-glob-to-any-file:
          - 'firewood/src/manager.rs'
          - 'firewood/src/**/proposal*.rs'
          - 'firewood/src/v2/**'
area/hashing:
  - changed-files:
      - any-glob-to-any-file:
          - 'triehash/**'
          - 'storage/src/hashers/**'
