  - changed-files:
      - any-glob-to-any-file: ['**/proof*.rs', '**/proofs/**']
area/ffi:
  - changed-files:
      - any-glob-to-any-file: ['ffi/**']
area/cli:
  - changed-files:
      - any-glob-to-any-file: ['fwdctl/**']
area/benchmark:
  - changed-files:
      - any-glob-to-any-file: ['benchmark/**']
area/ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**', '.devcontainer/**']
area/docs:
  - changed-files:
      - any-glob-to-any-file: ['**/*.md', 'docs/**']
