name: publish

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish-firewood-crate:
    name: firewood-lib
    runs-on: ubuntu-latest
    # Only publish from the canonical repo on version tags.
    if: github.repository == 'ava-labs/firewood' && startsWith(github.event.release.tag_name, 'v')
    permissions:
      contents: read
      id-token: write  # Required to request a crates.io OIDC token.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # @stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # @v2 -> v2.9.1
        with:
          shared-key: publish
          save-if: "false"
      - name: Fetch crates.io OIDC token
        id: auth
        run: |
          TOKEN=$(curl -sH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo xtask publish-crates
