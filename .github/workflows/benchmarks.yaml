name: firewood-benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # @master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # @v2
        with:
          shared-key: "maxperf-logger-test_utils"
          cache-all-crates: true
          cache-workspace-crates: true
      - name: Cargo Fetch (run `cargo generate-lockfile` if this fails)
        run: cargo fetch --locked --verbose
      - name: Build
        run: cargo build --frozen --profile maxperf --features logger,test_utils --workspace --benches
      - name: Run firewood crate hashop benchmark
        run: cargo bench --frozen --profile maxperf --features logger,test_utils -p firewood --bench hashops -- --noplot
      - name: Run firewood crate defer_persist benchmark
        run: cargo bench --frozen --profile maxperf --features logger,test_utils -p firewood --bench defer_persist -- --noplot
      - name: Run storage crate benchmarks
        run: cargo bench --frozen --profile maxperf --features logger -p firewood-storage --bench serializer -- --noplot
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: target/criterion
