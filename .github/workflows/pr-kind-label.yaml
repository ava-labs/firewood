name: Label pull requests by kind

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Map conventional-commit prefix -> kind label. No mapping = no label.
            const MAP = {
              fix: 'kind/correctness',
              perf: 'kind/performance',
              test: 'kind/testing',
              refactor: 'kind/tech-debt',
              chore: 'kind/tech-debt',
            };
            const title = context.payload.pull_request.title || '';
            const m = title.match(/^([a-z]+)(\([^)]*\))?!?:/);
            const prefix = m && m[1];
            const label = prefix && MAP[prefix];
            if (!label) {
              console.log(`No kind mapping for prefix ${prefix ?? '(none)'}`);
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
            console.log(`Added ${label}`);
