name: Performance Replay Benchmark (10K)

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  REPLAY_LOG_URL: "https://github.com/AminR443/firewood-benchmark-reports/raw/refs/heads/main/replay-files/replay_10k.log"
  AWS_REGION: us-west-2
  BENCHMARK_REPORTS_DIR: benchmark-reports-repository
  BENCHMARK_REPORTS_REPOSITORY: AminR443/firewood-benchmark-reports
  BENCHMARK_REPORTS_GH_REPOSITORY: github.com/AminR443/firewood-benchmark-reports
  BENCHMARK_REPORTS_PAGES_URL: https://aminr443.github.io/firewood-benchmark-reports
  BENCHMARK_REPORTS_BRANCH: gh-pages
  BENCHMARK_THEME_CSS_URL: https://raw.githubusercontent.com/AminR443/firewood-benchmark-reports/refs/heads/main/theme.css

jobs:
  benchmark-pr:
    name: Benchmark (PR)
    if: github.event_name == 'pull_request'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions: { issues: write, pull-requests: write }
    concurrency:
      {
        group: "performance-replay-pr-${{ github.event.pull_request.number }}",
        cancel-in-progress: true,
      }
    env:
      BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          { ref: "${{ github.event.pull_request.head.sha }}", fetch-depth: 0 }

      - name: Resolve metadata & check base data
        id: meta
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_EVENT_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/heads/$BASE_REF"
          base_sha="$(git merge-base "$HEAD_SHA" FETCH_HEAD 2>/dev/null || echo "$BASE_EVENT_SHA")"
          pr_dir="dev/replay-10k/pr-$PR_NUMBER"
          cmp_dir="$pr_dir/commits/$HEAD_SHA"

          rm -rf "./$BENCHMARK_REPORTS_DIR"
          git clone --depth 1 -b "$BENCHMARK_REPORTS_BRANCH" \
            "https://x-access-token:${BENCHMARK_TOKEN}@github.com/${BENCHMARK_REPORTS_REPOSITORY}.git" \
            "./$BENCHMARK_REPORTS_DIR"

          has_sha() { [[ -f "$1/data.js" ]] && grep -q "$2" "$1/data.js" && echo true || echo false; }
          base_in_cmp=$(has_sha "$BENCHMARK_REPORTS_DIR/$cmp_dir" "$base_sha")
          base_required=false
          [[ "$base_in_cmp" == true ]] || base_required=true

          base_subject="$(git show -s --format=%s "$base_sha" 2>/dev/null || echo "$base_sha")"
          head_subject="$(git show -s --format=%s "$HEAD_SHA" 2>/dev/null || echo "$HEAD_SHA")"

          {
            echo "base-sha=$base_sha"
            echo "head-sha=$HEAD_SHA"
            echo "pr-data-dir=$pr_dir"
            echo "comparison-data-dir=$cmp_dir"
            echo "base-required=$base_required"
            echo "base-in-comparison=$base_in_cmp"
            echo "base-subject<<EOF"
            echo "$base_subject"
            echo "EOF"
            echo "head-subject<<EOF"
            echo "$head_subject"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          [[ "$base_required" == true ]] \
            && echo "::notice::Base data missing in comparison - will benchmark base commit." \
            || echo "::notice::Base data exists in comparison graph."

      - name: Prepare base source tree
        id: prepare-base
        if: steps.meta.outputs.base-required == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf ./benchmark-sources/base
          git worktree add --detach ./benchmark-sources/base "${{ steps.meta.outputs.base-sha }}"

      - name: Benchmark base commit
        if: steps.meta.outputs.base-required == 'true' && steps.prepare-base.outcome == 'success'
        continue-on-error: true
        id: benchmark-base
        uses: ./.github/actions/run-benchmark
        with:
          source-dir: ./benchmark-sources/base
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish base to comparison
        if: steps.meta.outputs.base-in-comparison != 'true' && steps.benchmark-base.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/publish-benchmark
        with:
          name: Replay 10K PR Compare
          output-file: ${{ steps.benchmark-base.outputs.output-file }}
          ref: ${{ steps.meta.outputs.base-sha }}
          github-token: ${{ env.BENCHMARK_TOKEN }}
          benchmark-data-dir-path: ${{ steps.meta.outputs.comparison-data-dir }}
          alert-threshold: "150%"
          comment-on-alert: "false"
          fail-on-alert: "false"
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}

      - name: Clean up base worktree
        if: always() && steps.meta.outputs.base-required == 'true'
        run: git worktree remove --force ./benchmark-sources/base 2>/dev/null || rm -rf ./benchmark-sources/base

      - name: Benchmark PR head
        id: benchmark-head
        uses: ./.github/actions/run-benchmark
        with:
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish head to PR trend
        uses: ./.github/actions/publish-benchmark
        with:
          name: Replay 10K PR
          output-file: ${{ steps.benchmark-head.outputs.output-file }}
          ref: ${{ steps.meta.outputs.head-sha }}
          github-token: ${{ env.BENCHMARK_TOKEN }}
          benchmark-data-dir-path: ${{ steps.meta.outputs.pr-data-dir }}
          alert-threshold: "150%"
          comment-on-alert: "false"
          fail-on-alert: "false"
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}

      - name: Publish head to comparison
        uses: ./.github/actions/publish-benchmark
        with:
          name: Replay 10K PR Compare
          output-file: ${{ steps.benchmark-head.outputs.output-file }}
          ref: ${{ steps.meta.outputs.head-sha }}
          github-token: ${{ env.BENCHMARK_TOKEN }}
          benchmark-data-dir-path: ${{ steps.meta.outputs.comparison-data-dir }}
          alert-threshold: "150%"
          comment-on-alert: "false"
          fail-on-alert: "false"
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}

      - name: Apply theme & post PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ steps.meta.outputs.base-sha }}
          HEAD_SHA: ${{ steps.meta.outputs.head-sha }}
          BASE_SUBJECT: ${{ steps.meta.outputs.base-subject }}
          HEAD_SUBJECT: ${{ steps.meta.outputs.head-subject }}
          BASE_BENCHMARK_REQUESTED: ${{ steps.meta.outputs.base-required }}
          BASE_BENCHMARK_OUTCOME: ${{ steps.benchmark-base.outcome }}
          PR_DATA_DIR: ${{ steps.meta.outputs.pr-data-dir }}
          COMPARISON_DATA_DIR: ${{ steps.meta.outputs.comparison-data-dir }}
          TREND_URL: ${{ env.BENCHMARK_REPORTS_PAGES_URL }}/${{ steps.meta.outputs.pr-data-dir }}/
          COMPARISON_URL: ${{ env.BENCHMARK_REPORTS_PAGES_URL }}/${{ steps.meta.outputs.comparison-data-dir }}/
          BENCHMARK_DATA_DIRS: |
            ${{ steps.meta.outputs.pr-data-dir }}
            ${{ steps.meta.outputs.comparison-data-dir }}
          BENCHMARK_COMMIT_MESSAGE: "style: apply shared benchmark theme for PR graphs"
        run: |
          python3 .github/scripts/update_benchmark_reports.py
          python3 .github/scripts/post_replay_benchmark_comment.py

  benchmark-main:
    name: Benchmark (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions: { contents: write }
    concurrency: { group: performance-replay-main, cancel-in-progress: false }
    env:
      BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
      MAIN_DATA_DIR: bench/replay-10k
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/run-benchmark
        id: benchmark
        with:
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: ./.github/actions/publish-benchmark
        with:
          name: Go Benchmark
          output-file: ${{ steps.benchmark.outputs.output-file }}
          ref: ${{ github.sha }}
          github-token: ${{ env.BENCHMARK_TOKEN }}
          benchmark-data-dir-path: ${{ env.MAIN_DATA_DIR }}
          alert-threshold: "110%"
          comment-on-alert: "true"
          fail-on-alert: "true"
          alert-comment-cc-users: "@AminR443"
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}

      - name: Apply benchmark theme
        env:
          BENCHMARK_DATA_DIRS: ${{ env.MAIN_DATA_DIR }}
          BENCHMARK_COMMIT_MESSAGE: "style: apply shared benchmark theme for main graph"
        run: python3 .github/scripts/update_benchmark_reports.py
