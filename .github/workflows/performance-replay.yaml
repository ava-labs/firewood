name: Performance Replay Benchmark (10K)

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  # Replay log location - supports both HTTPS and S3 URLs
  # S3 example: s3://your-bucket/replay-files/replay_10k.mp.log
  # HTTPS example: https://example.com/replay_10k.mp.log
  REPLAY_LOG_URL: 'https://github.com/AminR443/firewood-benchmark-reports/raw/refs/heads/main/replay-files/replay_10k.mp.log'
  AWS_REGION: 'us-west-2'

jobs:
  # Run benchmark for PR commits and store graph data per PR
  benchmark-pr:
    name: Benchmark (PR)
    if: github.event_name == 'pull_request'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run benchmark
        uses: ./.github/actions/run-benchmark
        id: benchmark
        with:
          benchmark-name: 'Replay 10K (PR Commits)'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine PR results location
        id: location
        run: |
          echo "pr-data-dir=dev/replay-10k/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "commit-data-dir=dev/replay-10k/pr-${{ github.event.pull_request.number }}/commits/${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store PR benchmark trend
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR'
          tool: 'go'
          output-file-path: ${{ steps.benchmark.outputs.output-file }}
          ref: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: 'github.com/AminR443/firewood-benchmark-reports'
          gh-pages-branch: main
          benchmark-data-dir-path: ${{ steps.location.outputs.pr-data-dir }}
          # Show alert but don't fail PR
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark action workspace (second run)
        run: rm -rf ./benchmark-data-repository

      - name: Store PR benchmark for commit
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR Commit'
          tool: 'go'
          output-file-path: ${{ steps.benchmark.outputs.output-file }}
          ref: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: 'github.com/AminR443/firewood-benchmark-reports'
          benchmark-data-dir-path: ${{ steps.location.outputs.commit-data-dir }}
          # Show alert but don't fail PR
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Apply dark theme to PR benchmark pages
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          PR_DATA_DIR: ${{ steps.location.outputs.pr-data-dir }}
          COMMIT_DATA_DIR: ${{ steps.location.outputs.commit-data-dir }}
        run: |
          set -euo pipefail

          rm -rf ./benchmark-theme-repository
          git clone --depth 1 --branch main "https://x-access-token:${BENCHMARK_TOKEN}@github.com/AminR443/firewood-benchmark-reports.git" ./benchmark-theme-repository

          cd ./benchmark-theme-repository

          for dir in "$PR_DATA_DIR" "$COMMIT_DATA_DIR"; do
            if [[ ! -f "$dir/index.html" ]]; then
              echo "::warning::Skipping ${dir} because index.html is missing"
              continue
            fi

            cat > "$dir/theme.css" <<'CSS'
          @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

          :root {
            --bg: #0b0f14;
            --panel: #111823;
            --text: #e6edf3;
            --border: #273246;
            --accent: #7aa2f7;
          }

          html,
          body {
            background: var(--bg) !important;
            color: var(--text) !important;
          }

          body,
          body * {
            font-family: "JetBrains Mono", monospace !important;
          }

          a {
            color: var(--accent) !important;
          }

          table,
          th,
          td {
            border-color: var(--border) !important;
            color: var(--text) !important;
          }

          thead th,
          tr:nth-child(even),
          tr:nth-child(odd) {
            background: var(--panel) !important;
          }

          code,
          pre {
            background: #0f1724 !important;
            color: var(--text) !important;
          }
          CSS

            if ! grep -q 'href="theme.css"' "$dir/index.html"; then
              sed -i 's#</head>#  <link rel="stylesheet" href="theme.css">\n</head>#' "$dir/index.html"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "$PR_DATA_DIR" "$COMMIT_DATA_DIR"

          if ! git diff --cached --quiet; then
            git commit -m "style: dark theme benchmark pages for PR run"
            git push origin main
          else
            echo "No benchmark theme changes to commit."
          fi

      - name: Post results to PR
        uses: actions/github-script@v7
        env:
          BENCHMARK_RESULTS: ${{ steps.benchmark.outputs.results }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          TREND_URL: https://aminr443.github.io/firewood-benchmark-reports/${{ steps.location.outputs.pr-data-dir }}/
          COMMIT_URL: https://aminr443.github.io/firewood-benchmark-reports/${{ steps.location.outputs.commit-data-dir }}/
        with:
          script: |
            const results = process.env.BENCHMARK_RESULTS;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const commitSha = process.env.COMMIT_SHA;
            const trendUrl = process.env.TREND_URL;
            const commitUrl = process.env.COMMIT_URL;

            const body = [
              '## Performance Test Results',
              '',
              'Triggered automatically for this PR commit.',
              '```',
              results,
              '```',
              '',
              `[PR trend graph](${trendUrl})`,
              '',
              `[This commit graph](${commitUrl})`,
              '',
              '---',
              `*Commit: \`${commitSha.substring(0, 8)}\`*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

  # Run benchmark for main branch (store and graph)
  benchmark-main:
    name: Benchmark (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions:
      contents: write
    concurrency:
      group: performance-replay-main
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Run benchmark
        uses: ./.github/actions/run-benchmark
        id: benchmark
        with:
          benchmark-name: 'Replay 10K'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Go Benchmark'
          tool: 'go'
          output-file-path: ${{ steps.benchmark.outputs.output-file }}
          ref: ${{ github.sha }}
          # TODO: Replace with org repo once gh-pages conflict is resolved
          # For now using external repo for benchmark data
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: bench/replay-10k
          alert-threshold: '110%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@AminR443'
          gh-repository: 'github.com/AminR443/firewood-benchmark-reports'

      - name: Apply dark theme to main benchmark page
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          MAIN_DATA_DIR: bench/replay-10k
        run: |
          set -euo pipefail

          rm -rf ./benchmark-theme-repository
          git clone --depth 1 --branch main "https://x-access-token:${BENCHMARK_TOKEN}@github.com/AminR443/firewood-benchmark-reports.git" ./benchmark-theme-repository

          cd ./benchmark-theme-repository

          if [[ ! -f "$MAIN_DATA_DIR/index.html" ]]; then
            echo "::warning::Skipping ${MAIN_DATA_DIR} because index.html is missing"
            exit 0
          fi

          cat > "$MAIN_DATA_DIR/theme.css" <<'CSS'
          @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

          :root {
            --bg: #0b0f14;
            --panel: #111823;
            --text: #e6edf3;
            --border: #273246;
            --accent: #7aa2f7;
          }

          html,
          body {
            background: var(--bg) !important;
            color: var(--text) !important;
          }

          body,
          body * {
            font-family: "JetBrains Mono", monospace !important;
          }

          a {
            color: var(--accent) !important;
          }

          table,
          th,
          td {
            border-color: var(--border) !important;
            color: var(--text) !important;
          }

          thead th,
          tr:nth-child(even),
          tr:nth-child(odd) {
            background: var(--panel) !important;
          }

          code,
          pre {
            background: #0f1724 !important;
            color: var(--text) !important;
          }
          CSS

          if ! grep -q 'href="theme.css"' "$MAIN_DATA_DIR/index.html"; then
            sed -i 's#</head>#  <link rel="stylesheet" href="theme.css">\n</head>#' "$MAIN_DATA_DIR/index.html"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "$MAIN_DATA_DIR"

          if ! git diff --cached --quiet; then
            git commit -m "style: dark theme benchmark page for main run"
            git push origin main
          else
            echo "No benchmark theme changes to commit."
          fi
