name: Performance Replay Benchmark (10K)

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  REPLAY_LOG_URL: 'https://github.com/AminR443/firewood-benchmark-reports/raw/refs/heads/main/replay-files/replay_10k.mp.log'
  AWS_REGION: 'us-west-2'
  BENCHMARK_REPORTS_REPOSITORY: 'AminR443/firewood-benchmark-reports'
  BENCHMARK_REPORTS_GH_REPOSITORY: 'github.com/AminR443/firewood-benchmark-reports'
  BENCHMARK_REPORTS_PAGES_URL: 'https://aminr443.github.io/firewood-benchmark-reports'
  BENCHMARK_THEME_CSS_URL: 'https://raw.githubusercontent.com/AminR443/firewood-benchmark-reports/refs/heads/main/theme.css'

jobs:
  benchmark-pr:
    name: Benchmark (PR)
    if: github.event_name == 'pull_request'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions:
      issues: write
      pull-requests: write
    concurrency:
      group: performance-replay-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Determine PR results locations
        id: location
        run: |
          echo "pr-data-dir=dev/replay-10k/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "comparison-data-dir=dev/replay-10k/pr-${{ github.event.pull_request.number }}/commits/${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout base commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Run benchmark on base commit
        uses: ./.github/actions/run-benchmark
        id: benchmark-base
        with:
          benchmark-name: 'Replay 10K (PR Base)'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store base result in PR trend graph
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-base.outputs.output-file }}
          ref: ${{ github.event.pull_request.base.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          benchmark-data-dir-path: ${{ steps.location.outputs.pr-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store base result in commit comparison graph
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR Compare'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-base.outputs.output-file }}
          ref: ${{ github.event.pull_request.base.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          benchmark-data-dir-path: ${{ steps.location.outputs.comparison-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run benchmark on PR head commit
        uses: ./.github/actions/run-benchmark
        id: benchmark-head
        with:
          benchmark-name: 'Replay 10K (PR Head)'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store head result in PR trend graph
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-head.outputs.output-file }}
          ref: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          benchmark-data-dir-path: ${{ steps.location.outputs.pr-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store head result in commit comparison graph
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR Compare'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-head.outputs.output-file }}
          ref: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          benchmark-data-dir-path: ${{ steps.location.outputs.comparison-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Apply benchmark theme to PR graphs
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          PR_DATA_DIR: ${{ steps.location.outputs.pr-data-dir }}
          COMPARISON_DATA_DIR: ${{ steps.location.outputs.comparison-data-dir }}
          THEME_CSS_URL: ${{ env.BENCHMARK_THEME_CSS_URL }}
        run: |
          set -euo pipefail

          rm -rf ./benchmark-theme-repository
          git clone --depth 1 --branch main "https://x-access-token:${BENCHMARK_TOKEN}@github.com/${BENCHMARK_REPORTS_REPOSITORY}.git" ./benchmark-theme-repository

          cd ./benchmark-theme-repository

          apply_theme() {
            local dir="$1"
            if [[ ! -f "$dir/index.html" ]]; then
              echo "::warning::Skipping ${dir} because index.html is missing"
              return
            fi

            curl -fsSL "$THEME_CSS_URL" -o "$dir/theme.css"
            if ! grep -q 'href="theme.css"' "$dir/index.html"; then
              sed -i 's#</head>#  <link rel="stylesheet" href="theme.css">\n</head>#' "$dir/index.html"
            fi
          }

          apply_theme "$PR_DATA_DIR"
          apply_theme "$COMPARISON_DATA_DIR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "$PR_DATA_DIR" "$COMPARISON_DATA_DIR"

          if ! git diff --cached --quiet; then
            git commit -m "style: apply shared benchmark theme for PR graphs"
            git push origin main
          else
            echo "No benchmark theme changes to commit."
          fi

      - name: Post results to PR
        uses: actions/github-script@v7
        env:
          BENCHMARK_RESULTS: ${{ steps.benchmark-head.outputs.results }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_COMMIT_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          TREND_URL: ${{ env.BENCHMARK_REPORTS_PAGES_URL }}/${{ steps.location.outputs.pr-data-dir }}/
          COMPARISON_URL: ${{ env.BENCHMARK_REPORTS_PAGES_URL }}/${{ steps.location.outputs.comparison-data-dir }}/
        with:
          script: |
            const results = process.env.BENCHMARK_RESULTS;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const baseCommitSha = process.env.BASE_COMMIT_SHA;
            const headCommitSha = process.env.HEAD_COMMIT_SHA;
            const trendUrl = process.env.TREND_URL;
            const comparisonUrl = process.env.COMPARISON_URL;

            const body = [
              '## Performance Test Results',
              '',
              `Base commit: \`${baseCommitSha.substring(0, 8)}\``,
              `PR head commit: \`${headCommitSha.substring(0, 8)}\``,
              '',
              '```',
              results,
              '```',
              '',
              `[PR trend graph](${trendUrl})`,
              '',
              `[Base vs head graph](${comparisonUrl})`,
              '',
              '---',
              '*Includes benchmark data for both base and head commits.*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

  benchmark-main:
    name: Benchmark (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions:
      contents: write
    concurrency:
      group: performance-replay-main
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Run benchmark
        uses: ./.github/actions/run-benchmark
        id: benchmark
        with:
          benchmark-name: 'Replay 10K'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Go Benchmark'
          tool: 'go'
          output-file-path: ${{ steps.benchmark.outputs.output-file }}
          ref: ${{ github.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: bench/replay-10k
          alert-threshold: '110%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@AminR443'
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}

      - name: Apply benchmark theme to main graph
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          MAIN_DATA_DIR: bench/replay-10k
          THEME_CSS_URL: ${{ env.BENCHMARK_THEME_CSS_URL }}
        run: |
          set -euo pipefail

          rm -rf ./benchmark-theme-repository
          git clone --depth 1 --branch main "https://x-access-token:${BENCHMARK_TOKEN}@github.com/${BENCHMARK_REPORTS_REPOSITORY}.git" ./benchmark-theme-repository

          cd ./benchmark-theme-repository

          if [[ ! -f "$MAIN_DATA_DIR/index.html" ]]; then
            echo "::warning::Skipping ${MAIN_DATA_DIR} because index.html is missing"
            exit 0
          fi

          curl -fsSL "$THEME_CSS_URL" -o "$MAIN_DATA_DIR/theme.css"

          if ! grep -q 'href="theme.css"' "$MAIN_DATA_DIR/index.html"; then
            sed -i 's#</head>#  <link rel="stylesheet" href="theme.css">\n</head>#' "$MAIN_DATA_DIR/index.html"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "$MAIN_DATA_DIR"

          if ! git diff --cached --quiet; then
            git commit -m "style: apply shared benchmark theme for main graph"
            git push origin main
          else
            echo "No benchmark theme changes to commit."
          fi
