name: Performance Replay Benchmark (10K)

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  REPLAY_LOG_URL: 'https://github.com/AminR443/firewood-benchmark-reports/raw/refs/heads/main/replay-files/replay_10k.mp.log'
  AWS_REGION: 'us-west-2'
  BENCHMARK_REPORTS_REPOSITORY: 'AminR443/firewood-benchmark-reports'
  BENCHMARK_REPORTS_GH_REPOSITORY: 'github.com/AminR443/firewood-benchmark-reports'
  BENCHMARK_REPORTS_PAGES_URL: 'https://aminr443.github.io/firewood-benchmark-reports'
  BENCHMARK_REPORTS_BRANCH: 'gh-pages'
  BENCHMARK_THEME_CSS_URL: 'https://raw.githubusercontent.com/AminR443/firewood-benchmark-reports/refs/heads/main/theme.css'

jobs:
  benchmark-pr:
    name: Benchmark (PR)
    if: github.event_name == 'pull_request'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions:
      issues: write
      pull-requests: write
    concurrency:
      group: performance-replay-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Determine PR results locations
        id: location
        run: |
          echo "pr-data-dir=dev/replay-10k/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "comparison-data-dir=dev/replay-10k/pr-${{ github.event.pull_request.number }}/commits/${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Capture base and head commit subjects
        id: commit_subjects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          base_subject="$(git show -s --format=%s "$BASE_SHA" 2>/dev/null || true)"
          head_subject="$(git show -s --format=%s "$HEAD_SHA" 2>/dev/null || true)"

          if [[ -z "$base_subject" ]]; then
            base_subject="$BASE_SHA"
          fi
          if [[ -z "$head_subject" ]]; then
            head_subject="$HEAD_SHA"
          fi

          {
            echo "base-subject<<EOF"
            echo "$base_subject"
            echo "EOF"
            echo "head-subject<<EOF"
            echo "$head_subject"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check existing base benchmark data
        id: base-data
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          PR_DATA_DIR: ${{ steps.location.outputs.pr-data-dir }}
          COMPARISON_DATA_DIR: ${{ steps.location.outputs.comparison-data-dir }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          rm -rf ./benchmark-data-check-repository
          git clone --depth 1 --branch "${BENCHMARK_REPORTS_BRANCH}" "https://x-access-token:${BENCHMARK_TOKEN}@github.com/${BENCHMARK_REPORTS_REPOSITORY}.git" ./benchmark-data-check-repository
          cd ./benchmark-data-check-repository

          has_commit() {
            local dir="$1"
            local sha="$2"
            local data_file="${dir}/data.js"

            if [[ ! -f "$data_file" ]]; then
              echo "false"
              return
            fi

            if grep -q "$sha" "$data_file"; then
              echo "true"
            else
              echo "false"
            fi
          }

          base_in_pr_trend="$(has_commit "$PR_DATA_DIR" "$BASE_SHA")"
          base_in_comparison="$(has_commit "$COMPARISON_DATA_DIR" "$BASE_SHA")"

          base_required="false"
          if [[ "$base_in_pr_trend" != "true" || "$base_in_comparison" != "true" ]]; then
            base_required="true"
          fi

          echo "base-required=${base_required}" >> "$GITHUB_OUTPUT"
          echo "base-in-pr-trend=${base_in_pr_trend}" >> "$GITHUB_OUTPUT"
          echo "base-in-comparison=${base_in_comparison}" >> "$GITHUB_OUTPUT"

          if [[ "$base_required" == "true" ]]; then
            echo "::notice::Missing base benchmark data detected. Benchmarking base commit."
          else
            echo "::notice::Base benchmark data already exists in both graphs. Skipping base benchmark run."
          fi

      - name: Prepare base source tree
        id: prepare_base
        if: steps.base-data.outputs.base-required == 'true'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          mkdir -p ./benchmark-sources
          if [[ -d ./benchmark-sources/base ]]; then
            git worktree remove --force ./benchmark-sources/base || rm -rf ./benchmark-sources/base
          fi

          git worktree add --detach ./benchmark-sources/base "$BASE_SHA"

      - name: Run benchmark on base commit
        if: steps.base-data.outputs.base-required == 'true' && steps.prepare_base.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/run-benchmark
        id: benchmark-base
        with:
          source-dir: './benchmark-sources/base'
          benchmark-name: 'Replay 10K (PR Base)'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        if: steps.base-data.outputs.base-in-pr-trend != 'true' && steps.benchmark-base.outcome == 'success'
        run: rm -rf ./benchmark-data-repository

      - name: Store base result in PR trend graph
        if: steps.base-data.outputs.base-in-pr-trend != 'true' && steps.benchmark-base.outcome == 'success'
        continue-on-error: true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-base.outputs.output-file }}
          ref: ${{ github.event.pull_request.base.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}
          benchmark-data-dir-path: ${{ steps.location.outputs.pr-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark action workspace
        if: steps.base-data.outputs.base-in-comparison != 'true' && steps.benchmark-base.outcome == 'success'
        run: rm -rf ./benchmark-data-repository

      - name: Store base result in commit comparison graph
        if: steps.base-data.outputs.base-in-comparison != 'true' && steps.benchmark-base.outcome == 'success'
        continue-on-error: true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR Compare'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-base.outputs.output-file }}
          ref: ${{ github.event.pull_request.base.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}
          benchmark-data-dir-path: ${{ steps.location.outputs.comparison-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean up base source tree
        if: always() && steps.base-data.outputs.base-required == 'true'
        run: git worktree remove --force ./benchmark-sources/base || rm -rf ./benchmark-sources/base

      - name: Warn if base benchmark failed
        if: steps.base-data.outputs.base-required == 'true' && steps.benchmark-base.outcome != 'success'
        run: echo "::warning::Base benchmark did not succeed (outcome=${{ steps.benchmark-base.outcome }}); continuing with PR head benchmark."

      - name: Run benchmark on PR head commit
        uses: ./.github/actions/run-benchmark
        id: benchmark-head
        with:
          source-dir: '.'
          benchmark-name: 'Replay 10K (PR Head)'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store head result in PR trend graph
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-head.outputs.output-file }}
          ref: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}
          benchmark-data-dir-path: ${{ steps.location.outputs.pr-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store head result in commit comparison graph
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Replay 10K PR Compare'
          tool: 'go'
          output-file-path: ${{ steps.benchmark-head.outputs.output-file }}
          ref: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}
          benchmark-data-dir-path: ${{ steps.location.outputs.comparison-data-dir }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Apply benchmark theme to PR graphs
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          PR_DATA_DIR: ${{ steps.location.outputs.pr-data-dir }}
          COMPARISON_DATA_DIR: ${{ steps.location.outputs.comparison-data-dir }}
          THEME_CSS_URL: ${{ env.BENCHMARK_THEME_CSS_URL }}
          BASE_COMMIT_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_COMMIT_SUBJECT: ${{ steps.commit_subjects.outputs.base-subject }}
          HEAD_COMMIT_SUBJECT: ${{ steps.commit_subjects.outputs.head-subject }}
        run: |
          set -euo pipefail

          rm -rf ./benchmark-theme-repository
          git clone --depth 1 --branch "${BENCHMARK_REPORTS_BRANCH}" "https://x-access-token:${BENCHMARK_TOKEN}@github.com/${BENCHMARK_REPORTS_REPOSITORY}.git" ./benchmark-theme-repository

          cd ./benchmark-theme-repository

          postprocess_data_file() {
            local dir="$1"
            local data_file="${dir}/data.js"

            if [[ ! -f "$data_file" ]]; then
              return
            fi

            if ! command -v python3 >/dev/null 2>&1; then
              echo "::warning::Skipping benchmark data postprocessing for ${dir}; python3 is not available"
              return
            fi

            python3 - "$data_file" "$BASE_COMMIT_SHA" "$BASE_COMMIT_SUBJECT" "$HEAD_COMMIT_SHA" "$HEAD_COMMIT_SUBJECT" <<'PY'
          import json
          import sys

          file_path, base_sha, base_subject, head_sha, head_subject = sys.argv[1:6]
          prefix = "window.BENCHMARK_DATA = "

          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()

          if not content.startswith(prefix):
              raise SystemExit(0)

          try:
              data = json.loads(content[len(prefix):])
          except json.JSONDecodeError:
              raise SystemExit(0)

          changed = False
          entries = data.get("entries", {})

          if isinstance(entries, dict):
              for suites in entries.values():
                  if not isinstance(suites, list):
                      continue

                  for suite in suites:
                      if not isinstance(suite, dict):
                          continue

                      commit = suite.get("commit")
                      if isinstance(commit, dict):
                          commit_id = commit.get("id")
                          if commit_id == base_sha and commit.get("message") != base_subject:
                              commit["message"] = base_subject
                              changed = True
                          elif commit_id == head_sha and commit.get("message") != head_subject:
                              commit["message"] = head_subject
                              changed = True

                      benches = suite.get("benches")
                      if not isinstance(benches, list):
                          continue

                      filtered_benches = []
                      removed_malformed_bench = False

                      for bench in benches:
                          if not isinstance(bench, dict):
                              filtered_benches.append(bench)
                              continue

                          name = bench.get("name")
                          unit = bench.get("unit")

                          # Drop the malformed aggregate bench produced by Go parser output.
                          if name == "BenchmarkReplayLog":
                              removed_malformed_bench = True
                              changed = True
                              continue

                          if isinstance(unit, str):
                              converted_unit = None
                              if unit == "ns/op":
                                  converted_unit = "s/op"
                              elif unit == "ns":
                                  converted_unit = "s"
                              elif unit.startswith("ns/"):
                                  converted_unit = "s/" + unit[3:]

                              if converted_unit is not None:
                                  value = bench.get("value")
                                  if isinstance(value, (int, float)):
                                      bench["value"] = value / 1_000_000_000
                                  bench["unit"] = converted_unit
                                  changed = True

                                  if isinstance(name, str):
                                      bench["name"] = (
                                          name.replace(" - ns/op", " - s/op")
                                          .replace(" - ns/", " - s/")
                                      )

                          filtered_benches.append(bench)

                      if removed_malformed_bench:
                          suite["benches"] = filtered_benches

          if changed:
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(prefix + json.dumps(data, indent=2))
          PY
          }

          apply_theme() {
            local dir="$1"
            if [[ ! -f "$dir/index.html" ]]; then
              echo "::warning::Skipping ${dir} because index.html is missing"
              return
            fi

            curl -fsSL "$THEME_CSS_URL" -o "$dir/theme.css"
            if ! grep -q 'href="theme.css"' "$dir/index.html"; then
              sed -i 's#</head>#  <link rel="stylesheet" href="theme.css">\n</head>#' "$dir/index.html"
            fi
          }

          postprocess_data_file "$PR_DATA_DIR"
          postprocess_data_file "$COMPARISON_DATA_DIR"

          apply_theme "$PR_DATA_DIR"
          apply_theme "$COMPARISON_DATA_DIR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .

          if ! git diff --cached --quiet; then
            git commit -m "style: apply shared benchmark theme for PR graphs"
            git push origin "${BENCHMARK_REPORTS_BRANCH}"
          else
            echo "No benchmark theme changes to commit."
          fi

      - name: Post results to PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_COMMIT_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_BENCHMARK_REQUESTED: ${{ steps.base-data.outputs.base-required }}
          BASE_BENCHMARK_OUTCOME: ${{ steps.benchmark-base.outcome }}
          PR_DATA_DIR: ${{ steps.location.outputs.pr-data-dir }}
          COMPARISON_DATA_DIR: ${{ steps.location.outputs.comparison-data-dir }}
          TREND_URL: ${{ env.BENCHMARK_REPORTS_PAGES_URL }}/${{ steps.location.outputs.pr-data-dir }}/
          COMPARISON_URL: ${{ env.BENCHMARK_REPORTS_PAGES_URL }}/${{ steps.location.outputs.comparison-data-dir }}/
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const baseCommitSha = process.env.BASE_COMMIT_SHA;
            const headCommitSha = process.env.HEAD_COMMIT_SHA;
            const baseBenchmarkRequested = process.env.BASE_BENCHMARK_REQUESTED === 'true';
            const baseBenchmarkOutcome = process.env.BASE_BENCHMARK_OUTCOME || 'skipped';
            const prDataDir = process.env.PR_DATA_DIR;
            const comparisonDataDir = process.env.COMPARISON_DATA_DIR;
            const trendUrl = process.env.TREND_URL;
            const comparisonUrl = process.env.COMPARISON_URL;
            const marker = '<!-- replay-10k-performance-summary -->';
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const shortSha = (sha) => (sha || '').substring(0, 8);

            const formatValue = (value, unit) => {
              if (typeof value !== 'number' || !Number.isFinite(value)) {
                return '—';
              }
              if (value >= 1) {
                return `${value.toFixed(3)} ${unit}`;
              }
              if (value >= 0.01) {
                return `${value.toFixed(4)} ${unit}`;
              }
              if (value >= 0.0001) {
                return `${value.toFixed(6)} ${unit}`;
              }
              return `${value.toExponential(2)} ${unit}`;
            };

            const deltaText = (current, baseline) => {
              if (
                typeof current !== 'number' ||
                typeof baseline !== 'number' ||
                !Number.isFinite(current) ||
                !Number.isFinite(baseline) ||
                baseline === 0
              ) {
                return '—';
              }
              const pct = ((current - baseline) / baseline) * 100;
              const sign = pct > 0 ? '+' : '';
              const color = pct <= -1 ? '🟢' : pct >= 1 ? '🔴' : '🟡';
              return `${color} ${sign}${pct.toFixed(2)}%`;
            };

            const parseBenchmarkData = (relativeDir) => {
              const dataPath = path.join(process.env.GITHUB_WORKSPACE, 'benchmark-theme-repository', relativeDir, 'data.js');
              if (!fs.existsSync(dataPath)) {
                return null;
              }

              const prefix = 'window.BENCHMARK_DATA = ';
              const content = fs.readFileSync(dataPath, 'utf8');
              if (!content.startsWith(prefix)) {
                return null;
              }

              try {
                return JSON.parse(content.slice(prefix.length));
              } catch {
                return null;
              }
            };

            const getEntries = (data, suiteName) => {
              const entries = data?.entries?.[suiteName];
              return Array.isArray(entries) ? entries : [];
            };

            const findLastBySha = (entries, sha) => {
              for (let i = entries.length - 1; i >= 0; i -= 1) {
                if (entries[i]?.commit?.id === sha) {
                  return { entry: entries[i], index: i };
                }
              }
              return null;
            };

            const toMetricMap = (entry) => {
              const out = new Map();
              const benches = Array.isArray(entry?.benches) ? entry.benches : [];
              for (const bench of benches) {
                if (!bench || typeof bench !== 'object') {
                  continue;
                }
                if (typeof bench.name !== 'string') {
                  continue;
                }
                if (typeof bench.value !== 'number' || !Number.isFinite(bench.value)) {
                  continue;
                }
                out.set(bench.name, {
                  value: bench.value,
                  unit: typeof bench.unit === 'string' ? bench.unit : '',
                });
              }
              return out;
            };

            const prettifyMetricName = (name) => {
              const raw = name.replace(/^BenchmarkReplayLog - /, '');
              if (raw === 's/op') return 'Total replay';
              if (raw === 's/commit') return 'Commit';
              if (raw === 's/propose-on-db') return 'Propose on DB';
              if (raw === 's/propose-on-proposal') return 'Propose on proposal';
              if (raw === 's/batch') return 'Batch update';
              if (raw === 's/get-latest') return 'Get latest';
              return raw;
            };

            const trendData = parseBenchmarkData(prDataDir);
            const comparisonData = parseBenchmarkData(comparisonDataDir);

            const trendEntries = getEntries(trendData, 'Replay 10K PR');
            const compareEntries = getEntries(comparisonData, 'Replay 10K PR Compare');

            const headTrend = findLastBySha(trendEntries, headCommitSha) || (trendEntries.length > 0
              ? { entry: trendEntries[trendEntries.length - 1], index: trendEntries.length - 1 }
              : null);
            const headCompare = findLastBySha(compareEntries, headCommitSha);
            const baseCompare = findLastBySha(compareEntries, baseCommitSha);
            const baseTrend = findLastBySha(trendEntries, baseCommitSha);

            let previousTrend = null;
            if (headTrend) {
              for (let i = headTrend.index - 1; i >= 0; i -= 1) {
                const candidate = trendEntries[i];
                const candidateSha = candidate?.commit?.id;
                if (candidateSha && candidateSha !== headCommitSha && candidateSha !== baseCommitSha) {
                  previousTrend = candidate;
                  break;
                }
              }
            }

            const headEntry = headCompare?.entry || headTrend?.entry || null;
            const baseEntry = baseCompare?.entry || baseTrend?.entry || null;
            const prevEntry = previousTrend;

            const headMetrics = toMetricMap(headEntry);
            const baseMetrics = toMetricMap(baseEntry);
            const prevMetrics = toMetricMap(prevEntry);

            const preferredMetricOrder = [
              'BenchmarkReplayLog - s/op',
              'BenchmarkReplayLog - s/commit',
              'BenchmarkReplayLog - s/propose-on-db',
              'BenchmarkReplayLog - s/propose-on-proposal',
              'BenchmarkReplayLog - s/batch',
              'BenchmarkReplayLog - s/get-latest',
            ];

            const metricNames = preferredMetricOrder.filter((name) => headMetrics.has(name)).slice(0, 5);
            if (metricNames.length === 0) {
              for (const name of headMetrics.keys()) {
                if (name.startsWith('BenchmarkReplayLog - ') && !name.endsWith('commits')) {
                  metricNames.push(name);
                }
                if (metricNames.length >= 5) break;
              }
            }

            const commitLink = (sha) => `[${shortSha(sha)}](${repoUrl}/commit/${sha})`;
            const commitMessage = (entry) => (entry?.commit?.message || '').replace(/\r?\n/g, ' ');

            const rows = metricNames.map((name) => {
              const head = headMetrics.get(name);
              const prev = prevMetrics.get(name);
              const base = baseMetrics.get(name);

              return `| ${prettifyMetricName(name)} | ${formatValue(head?.value, head?.unit || '')} | ${deltaText(head?.value, prev?.value)} | ${deltaText(head?.value, base?.value)} |`;
            });

            const baseStatus = !baseBenchmarkRequested
              ? 'Base data reused from history.'
              : baseBenchmarkOutcome === 'success'
                ? 'Base benchmark executed in this run.'
                : `Base benchmark did not succeed (\`${baseBenchmarkOutcome}\`).`;

            const bodyLines = [
              marker,
              '## 🚀 Replay 10K Benchmark Summary',
              '',
              `**Head:** ${commitLink(headCommitSha)}${headEntry ? ` — ${commitMessage(headEntry)}` : ''}`,
              `**Base:** ${commitLink(baseCommitSha)}${baseEntry ? ` — ${commitMessage(baseEntry)}` : ''}`,
            ];

            if (prevEntry?.commit?.id) {
              bodyLines.push(`**Previous PR commit:** ${commitLink(prevEntry.commit.id)} — ${commitMessage(prevEntry)}`);
            } else {
              bodyLines.push('**Previous PR commit:** _Not available yet_');
            }

            bodyLines.push(
              '',
              '_Lower is better for all timing metrics._',
              '',
              '| Metric | Head | vs Previous | vs Base |',
              '| --- | ---: | ---: | ---: |',
            );

            if (rows.length > 0) {
              bodyLines.push(...rows);
            } else {
              bodyLines.push('| No parsed timing metrics | — | — | — |');
            }

            bodyLines.push(
              '',
              `**Status:** ${baseStatus}`,
              '',
              `📈 [PR trend graph](${trendUrl})`,
              `🧭 [Base vs head graph](${comparisonUrl})`,
            );

            const body = bodyLines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  benchmark-main:
    name: Benchmark (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: avago-runner-i4i-2xlarge-local-ssd
    permissions:
      contents: write
    concurrency:
      group: performance-replay-main
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Run benchmark
        uses: ./.github/actions/run-benchmark
        id: benchmark
        with:
          benchmark-name: 'Replay 10K'
          replay-log-url: ${{ env.REPLAY_LOG_URL }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean benchmark action workspace
        run: rm -rf ./benchmark-data-repository

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'Go Benchmark'
          tool: 'go'
          output-file-path: ${{ steps.benchmark.outputs.output-file }}
          ref: ${{ github.sha }}
          github-token: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: bench/replay-10k
          alert-threshold: '110%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@AminR443'
          gh-repository: ${{ env.BENCHMARK_REPORTS_GH_REPOSITORY }}
          gh-pages-branch: ${{ env.BENCHMARK_REPORTS_BRANCH }}

      - name: Apply benchmark theme to main graph
        env:
          BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_ACTION_BOT_TOKEN }}
          MAIN_DATA_DIR: bench/replay-10k
          THEME_CSS_URL: ${{ env.BENCHMARK_THEME_CSS_URL }}
        run: |
          set -euo pipefail

          rm -rf ./benchmark-theme-repository
          git clone --depth 1 --branch "${BENCHMARK_REPORTS_BRANCH}" "https://x-access-token:${BENCHMARK_TOKEN}@github.com/${BENCHMARK_REPORTS_REPOSITORY}.git" ./benchmark-theme-repository

          cd ./benchmark-theme-repository

          postprocess_data_file() {
            local dir="$1"
            local data_file="${dir}/data.js"

            if [[ ! -f "$data_file" ]]; then
              return
            fi

            if ! command -v python3 >/dev/null 2>&1; then
              echo "::warning::Skipping benchmark data postprocessing for ${dir}; python3 is not available"
              return
            fi

            python3 - "$data_file" <<'PY'
          import json
          import sys

          file_path = sys.argv[1]
          prefix = "window.BENCHMARK_DATA = "

          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()

          if not content.startswith(prefix):
              raise SystemExit(0)

          try:
              data = json.loads(content[len(prefix):])
          except json.JSONDecodeError:
              raise SystemExit(0)

          changed = False
          entries = data.get("entries", {})

          if isinstance(entries, dict):
              for suites in entries.values():
                  if not isinstance(suites, list):
                      continue

                  for suite in suites:
                      if not isinstance(suite, dict):
                          continue

                      benches = suite.get("benches")
                      if not isinstance(benches, list):
                          continue

                      filtered_benches = []
                      removed_malformed_bench = False

                      for bench in benches:
                          if not isinstance(bench, dict):
                              filtered_benches.append(bench)
                              continue

                          name = bench.get("name")
                          unit = bench.get("unit")

                          if name == "BenchmarkReplayLog":
                              removed_malformed_bench = True
                              changed = True
                              continue

                          if isinstance(unit, str):
                              converted_unit = None
                              if unit == "ns/op":
                                  converted_unit = "s/op"
                              elif unit == "ns":
                                  converted_unit = "s"
                              elif unit.startswith("ns/"):
                                  converted_unit = "s/" + unit[3:]

                              if converted_unit is not None:
                                  value = bench.get("value")
                                  if isinstance(value, (int, float)):
                                      bench["value"] = value / 1_000_000_000
                                  bench["unit"] = converted_unit
                                  changed = True

                                  if isinstance(name, str):
                                      bench["name"] = (
                                          name.replace(" - ns/op", " - s/op")
                                          .replace(" - ns/", " - s/")
                                      )

                          filtered_benches.append(bench)

                      if removed_malformed_bench:
                          suite["benches"] = filtered_benches

          if changed:
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(prefix + json.dumps(data, indent=2))
          PY
          }

          postprocess_data_file "$MAIN_DATA_DIR"

          if [[ ! -f "$MAIN_DATA_DIR/index.html" ]]; then
            echo "::warning::Skipping ${MAIN_DATA_DIR} because index.html is missing"
            exit 0
          fi

          curl -fsSL "$THEME_CSS_URL" -o "$MAIN_DATA_DIR/theme.css"

          if ! grep -q 'href="theme.css"' "$MAIN_DATA_DIR/index.html"; then
            sed -i 's#</head>#  <link rel="stylesheet" href="theme.css">\n</head>#' "$MAIN_DATA_DIR/index.html"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .

          if ! git diff --cached --quiet; then
            git commit -m "style: apply shared benchmark theme for main graph"
            git push origin "${BENCHMARK_REPORTS_BRANCH}"
          else
            echo "No benchmark theme changes to commit."
          fi
