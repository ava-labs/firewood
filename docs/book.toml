# Requires mdBook >= 0.5 (native alert syntax) and mdbook-linkcheck2 (any version).
# Frontmatter stripping is done by an in-repo jq preprocessor
# (scripts/mdbook-frontmatter-strip.sh), so it needs jq on PATH but no third-party
# preprocessor binary. Tool versions are pinned in `.github/workflows/gh-pages.yaml`.
[book]
title = "Firewood"
authors = ["Ava Labs"]
description = "Documentation for Firewood — a compaction-less database optimized for storing recent Merkleized blockchain state."
src = "src"
language = "en"

[rust]
edition = "2024"

[output.html]
site-url = "/firewood/"
git-repository-url = "https://github.com/ava-labs/firewood"
edit-url-template = "https://github.com/ava-labs/firewood/edit/main/docs/{path}"
default-theme = "rust"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"

# Strips the YAML frontmatter block (--- ... ---) from each chapter so the design-doc
# schema metadata does not render as a stray horizontal rule and heading. This is an
# in-repo jq preprocessor rather than a published crate, so there is no third-party
# binary to install in CI or keep alive. mdBook runs preprocessor commands from the
# book root, so the command path is relative to docs/, not the repo root.
[preprocessor.frontmatter-strip]
command = "../scripts/mdbook-frontmatter-strip.sh"

[output.linkcheck2]
follow-web-links = false
