# Requires mdBook >= 0.5 (native alert syntax) and mdbook-linkcheck2 (any version).
# The frontmatter stripper mdbook-yml-header is source-only (no prebuilt binary),
# so it is installed with a pinned `cargo install --locked mdbook-yml-header@0.1.5`
# rather than the SHA-pinned prebuilt path used for the other tools.
# Tool versions are pinned in `.github/workflows/gh-pages.yaml`.
[book]
title = "Firewood"
authors = ["Ava Labs"]
description = "Documentation for Firewood — a compaction-less database optimized for storing recent Merkleized blockchain state."
src = "src"
language = "en"

[rust]
edition = "2024"

[output.html]
site-url = "/firewood/"
git-repository-url = "https://github.com/ava-labs/firewood"
edit-url-template = "https://github.com/ava-labs/firewood/edit/main/docs/{path}"
default-theme = "rust"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"

# Strips the YAML frontmatter block (--- ... ---) from each chapter so the
# schema metadata does not render as a stray horizontal rule and heading.
# Binary: mdbook-yml-header (mdbook-<name> convention, so no explicit command).
[preprocessor.yml-header]

[output.linkcheck2]
follow-web-links = false
